{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welcome | G-MARS Virtual Lab</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.skip-btn{

position:absolute;
bottom:30px;
right:30px;

padding:10px 18px;
background:#ff4d4d;
color:white;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;

}

.skip-btn:hover{
background:#e03c3c;
}

</style>
</head>

<body>

<video id="introVideo" autoplay>
<source src="{% static 'videos/gmars_intro.mp4' %}" type="video/mp4">
</video>

<button class="skip-btn" onclick="skipIntro()">Skip Intro</button>

<script>

let redirectURL = "{{ redirect_url }}";

function skipIntro(){
window.location.href = redirectURL;
}

document.getElementById("introVideo").onended = function(){
window.location.href = redirectURL;
};

</script>

</body>
</html>
