{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welcome | G-MARS Virtual Lab</title>

<style>

body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  width: 100vw;
  overflow:hidden;
  position: relative;
}

.video-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
  max-width: 1200px; /* Limit width on large screens */
  max-height: 80vh;  /* Limit height on large screens */
  display: flex;
  justify-content: center;
  align-items: center;
}

video{
  width:100%;
  height:100%;
  max-width: 100%;
  max-height: 100%;
  object-fit: contain; /* Don't crop the video */
  box-shadow: 0 0 50px rgba(255, 77, 77, 0.2);
}

.skip-btn{
  position:absolute;
  bottom:30px;
  right:30px;
  padding:12px 24px;
  background:#ff4d4d;
  color:white;
  border:none;
  border-radius:10px;
  font-size:14px;
  font-weight: 600;
  cursor:pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  transition: all 0.3s;
  z-index: 10;
}

.skip-btn:hover{
  background:#fff;
  color: #ff4d4d;
  transform: translateY(-2px);
}

@media (max-width: 768px) {
  .video-wrapper {
    max-height: 100vh;
  }
  .skip-btn {
    bottom: 20px;
    right: 20px;
    padding: 10px 18px;
  }
}

</style>
</head>

<body>

<div class="video-wrapper">
  <video id="introVideo" autoplay playsinline>
    <source src="{% static 'videos/gmars_intro.mp4' %}" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<button class="skip-btn" onclick="skipIntro()">Skip Intro</button>

<script>

let redirectURL = "{{ redirect_url }}";

function skipIntro(){
window.location.href = redirectURL;
}

document.getElementById("introVideo").onended = function(){
window.location.href = redirectURL;
};

</script>

</body>
</html>
