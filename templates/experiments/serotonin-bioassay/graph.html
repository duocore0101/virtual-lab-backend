{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sigmoidal Log Dose Response Curve – Graph</title>

  <link rel="stylesheet"
        href="{% static 'experiments/rotarod/css/experiment.css' %}?v=10001">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0f0f0f;
      color: white;
      transition: 0.3s ease;
    }

    body.light-theme {
      background: #f4f6f9;
      color: #111;
    }

    .graph-card {
      max-width: 1000px;
      margin: 40px auto;
      padding: 35px;
      border-radius: 16px;
      position: relative;

      /* GREEN GRAPH PAPER */
      background:
        linear-gradient(#b9d8b9 1px, transparent 1px),
        linear-gradient(90deg, #b9d8b9 1px, transparent 1px),
        linear-gradient(#8fbf8f 2px, transparent 2px),
        linear-gradient(90deg, #8fbf8f 2px, transparent 2px),
        #dff3df;

      background-size:
        20px 20px,
        20px 20px,
        100px 100px,
        100px 100px;

      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .graph-title {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #0a3d0a;
    }

    .graph-subtitle {
      text-align: center;
      margin-bottom: 25px;
      color: #145214;
      font-weight: 500;
    }

    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 30px;
    }

    .fullscreen-btn {
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: #ff2e2e;
      color: #fff;
      box-shadow: 0 0 12px rgba(255, 0, 0, 0.6);
    }

    .next-btn {
      display: flex;
      justify-content: center;
      margin-top: 25px;
    }

    .next-btn button {
      padding: 10px 30px;
      font-weight: 600;
      border-radius: 25px;
      border: 2px solid #0a3d0a;
      background: transparent;
      color: #0a3d0a;
      cursor: pointer;
      transition: 0.3s;
    }

    .next-btn button:hover {
      background: #0a3d0a;
      color: white;
    }
  </style>
</head>

<body>

<div class="theme-toggle">
  <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
</div>

<div class="graph-card">

  <div class="graph-title">
    Sigmoidal Log Dose–Response Curve
  </div>

  <div class="graph-subtitle">
    Bioassay of Serotonin (5-HT) on Rat Fundus Strip
  </div>

  <canvas id="serotoninChart" height="120"></canvas>

  <div class="next-btn">
    <button onclick="location.href='/experiment/{{ experiment.slug }}/conclusion/'">
      Next ▶
    </button>
  </div>

</div>

<script>
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
</script>

<script>

/* =========================
   DATA POINTS FROM PRACTICAL
========================== */

/* Log volumes (approx from calculation section) */
const logDose = [-0.699, -0.222, 0];  

/* Responses (Average values) */
const responses = [23, 57, 41.67];

/* Smooth Sigmoidal Curve (Artificially generated points for shape) */
const smoothX = [];
const smoothY = [];

for (let x = -1.5; x <= 1.5; x += 0.05) {
  smoothX.push(x);

  /* Logistic function for sigmoidal shape */
  let y = 50 / (1 + Math.exp(-10 * (x + 1)));
  smoothY.push(y);
}

const ctx = document.getElementById("serotoninChart").getContext("2d");

new Chart(ctx, {
  type: "line",
  data: {
    labels: smoothX,
    datasets: [

      /* Smooth Sigmoid Line */
      {
        label: "Sigmoidal Curve",
        data: smoothY,
        borderColor: "#e67e22",
        borderWidth: 3,
        pointRadius: 0,
        fill: false,
        tension: 0.4
      },

      /* Experimental Points */
      {
        label: "Observed Responses",
        data: responses.map((y, i) => ({ x: logDose[i], y: y })),
        borderColor: "#1f77b4",
        backgroundColor: "#1f77b4",
        pointRadius: 6,
        showLine: false
      }
    ]
  },
  options: {
    plugins: {
      legend: { display: false }
    },
    scales: {
      x: {
        type: 'linear',
        title: {
          display: true,
          text: "Log Dose",
          color: "#003d1f",
          font: { weight: "bold" }
        },
        grid: { display: false }
      },
      y: {
        min: 0,
        max: 60,
        title: {
          display: true,
          text: "Response (mm)",
          color: "#003d1f",
          font: { weight: "bold" }
        },
        grid: { display: false }
      }
    }
  }
});
</script>

</body>
</html>
