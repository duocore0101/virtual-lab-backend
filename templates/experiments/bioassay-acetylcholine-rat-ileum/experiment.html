{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bioassay of Acetylcholine – Experiment</title>

  <link rel="stylesheet"
        href="{% static 'experiments/rotarod/css/intro.css' %}?v=10002">

  <style>
    .video-frame {
      width: 100%;
      height: 480px;
      border-radius: 14px;
      background: #000;
      margin-top: 20px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      display: none;
    }

    .start-btn {
      padding: 14px 30px;
      font-size: 18px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #ee0a0a, #b91c1c);
      color: #fff;
      font-weight: 600;
    }

    .top-actions {
      position: absolute;
      top: 18px;
      left: 22px;
      z-index: 20;
    }

    .dropdown-btn {
      background: linear-gradient(135deg, #1f2937, #111827);
      color: #ffffff;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .dropdown-btn:hover {
      background: linear-gradient(135deg, #ee0a0a, #e60909);
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #111;
      padding: 30px;
      border-radius: 12px;
      width: 95%;
      max-width: 1200px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      color: white;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #444;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #222;
    }

    .close-btn {
      float: right;
      cursor: pointer;
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="page-container">

  <h1 class="title">
    Bioassay of Acetylcholine (ACh) using Isolated Rat Ileum – Four Point Method
  </h1>

  <div class="top-actions">
  <button class="dropdown-btn" onclick="toggleTheme()">
    🌗 Theme
  </button>

  <button class="dropdown-btn" onclick="toggleFullscreen()">
    ⛶ Full Screen
  </button>
</div>

  <!-- VIDEO FRAME -->
  <div class="video-frame">
    <button class="start-btn" id="startBtn" onclick="startExperiment()">
      ▶ Start Practical
    </button>

    <video id="experimentVideo" controls>
      <!-- ✅ CHANGE VIDEO PATH HERE -->
      <source src="{% static 'experiments/bioassay-acetylcholine-rat-ileum/videos/ach-bioassay.mp4' %}" type="video/mp4">
    </video>
  </div>

  <!-- NAVIGATION -->
  <div class="button-row" style="justify-content:center; margin-top:25px;">
    <button class="back-btn"
      onclick="location.href='/experiment/{{ experiment.slug }}/theory/'">
      ⬅ Back
    </button>

    <button class="exp-btn" onclick="openModal()">
      View Observations 📊
    </button>

    <button class="exp-btn"
      onclick="goToGraph()">
      Next ▶
    </button>
  </div>

</div>

<!-- ================= OBSERVATION MODAL ================= -->
<div class="modal" id="obsModal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">✖</span>

    <h2 style="text-align:center;">
      Observation Table – Four Point Bioassay of ACh
    </h2>

    <table>
      <thead>
        <tr>
          <th>Cycle</th>
          <th>S1 (0.1 ml)</th>
          <th>S2 (0.4 ml)</th>
          <th>T1 (0.2 ml)</th>
          <th>T2 (0.8 ml)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td id="s1_1"></td>
          <td id="s2_1"></td>
          <td id="t1_1"></td>
          <td id="t2_1"></td>
        </tr>
        <tr>
          <td>2</td>
          <td id="s1_2"></td>
          <td id="s2_2"></td>
          <td id="t1_2"></td>
          <td id="t2_2"></td>
        </tr>
        <tr>
          <td>3</td>
          <td id="s1_3"></td>
          <td id="s2_3"></td>
          <td id="t1_3"></td>
          <td id="t2_3"></td>
        </tr>
        <tr>
          <td>4</td>
          <td id="s1_4"></td>
          <td id="s2_4"></td>
          <td id="t1_4"></td>
          <td id="t2_4"></td>
        </tr>
        <tr style="font-weight:bold;">
          <td>Mean</td>
          <td id="mean_s1"></td>
          <td id="mean_s2"></td>
          <td id="mean_t1"></td>
          <td id="mean_t2"></td>
        </tr>
      </tbody>
    </table>

  </div>
</div>

<script>

function startExperiment() {
  document.getElementById("startBtn").style.display = "none";
  let video = document.getElementById("experimentVideo");
  video.style.display = "block";
  video.play();

  video.onended = function() {
    fillObservations();
  };
}

function fillObservations() {

  // ================= CYCLE DATA =================

  // Cycle 1
  document.getElementById("s1_1").innerText = 10;
  document.getElementById("s2_1").innerText = 15;
  document.getElementById("t1_1").innerText = 12;
  document.getElementById("t2_1").innerText = 16;

  // Cycle 2
  document.getElementById("s1_2").innerText = 11;
  document.getElementById("s2_2").innerText = 15;
  document.getElementById("t1_2").innerText = 13;
  document.getElementById("t2_2").innerText = 15;

  // Cycle 3
  document.getElementById("s1_3").innerText = 10;
  document.getElementById("s2_3").innerText = 14;
  document.getElementById("t1_3").innerText = 13;
  document.getElementById("t2_3").innerText = 16;

  // Cycle 4
  document.getElementById("s1_4").innerText = 11;
  document.getElementById("s2_4").innerText = 15;
  document.getElementById("t1_4").innerText = 14;
  document.getElementById("t2_4").innerText = 15;

  // ================= MEAN VALUES =================

  document.getElementById("mean_s1").innerText = "10.5 mm";
  document.getElementById("mean_s2").innerText = "14.75 mm";
  document.getElementById("mean_t1").innerText = "13 mm";
  document.getElementById("mean_t2").innerText = "15.5 mm";
}

function openModal() {
  document.getElementById("obsModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("obsModal").style.display = "none";
}

function goToGraph() {
  location.href = "/experiment/{{ experiment.slug }}/graph/";
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
function toggleTheme() {
  document.body.classList.toggle("light-mode");
}
</script>

</body>
</html>
