{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Biostatistical Methods | Virtual Lab</title>

<link rel="stylesheet"
href="{% static 'experiments/common-laboratory-animals/css/experiment.css' %}">

<style>

/* ================= TOP BUTTONS ================= */

.top-actions{
position:fixed;
top:20px;
right:25px;
display:flex;
gap:12px;
z-index:9999;
}

.top-actions button{
padding:10px 18px;
border-radius:22px;
border:none;
cursor:pointer;
font-weight:600;
background:#ff2e2e;
color:#fff;
box-shadow:0 0 14px rgba(255,0,0,0.6);
transition:all .3s ease;
}

.top-actions button:hover{
transform:scale(1.08);
box-shadow:0 0 22px rgba(255,0,0,0.9);
}

/* ================= SECTION HEADINGS ================= */

.section-heading{
margin-top:40px;
cursor:pointer;
font-size:24px;
font-weight:700;
color:#ff2b2b;
text-align:center;
transition:all .3s ease;
}

.section-heading:hover{
transform:scale(1.05);
}

/* ================= LIGHT MODE FIXES ================= */

body.theme-light{
background:#f5f5f5;
}

body.theme-light .section-heading{
color:#d40000;
text-shadow:none;
}

/* ================= TITLE ================= */

.exp-title{
font-size:36px;
margin-bottom:35px;
}

/* ================= NAV BUTTON AREA ================= */

.exp-actions{
margin-top:60px;
}

</style>

</head>

<body class="theme-dark">

<!-- TOP ACTIONS -->

<div class="top-actions">
<button onclick="toggleTheme()">🌗 Theme</button>
<button onclick="toggleFullscreen()">⛶ Full Screen</button>
</div>

<div class="exp-container">

<h1 class="exp-title">Biostatistical Methods in Experimental Pharmacology</h1>

<!-- ================= TEST BUTTONS ================= -->

<h2 class="section-heading"
onclick="location.href='/experiment/{{ experiment.slug }}/anova/'">
One-Way ANOVA →
</h2>

<h2 class="section-heading"
onclick="location.href='/experiment/{{ experiment.slug }}/t-test/'">
Student’s t-test →
</h2>

<h2 class="section-heading"
onclick="location.href='/experiment/{{ experiment.slug }}/chi-square/'">
Chi-square (χ²) Test →
</h2>

<h2 class="section-heading"
onclick="location.href='/experiment/{{ experiment.slug }}/wilcoxon/'">
Wilcoxon Signed-Rank Test (Non-parametric paired test) →
</h2>


<!-- ================= NAVIGATION ================= -->

<div class="exp-actions">

<a href="/experiment/{{ experiment.slug }}/"
class="exp-nav-btn back-btn">
← Back to Introduction
</a>

<a href="/student/dashboard/"
class="exp-nav-btn finish-btn">
✔ Finish Practical
</a>

</div>

</div>

<script>

function toggleTheme(){
document.body.classList.toggle("theme-light");
document.body.classList.toggle("theme-dark");
}

function toggleFullscreen(){
if(!document.fullscreenElement){
document.documentElement.requestFullscreen();
}else{
document.exitFullscreen();
}
}

</script>

</body>
</html>
