{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Result Graph – Rabbit Jejunum</title>

<link rel="stylesheet"
href="{% static 'experiments/rotarod/css/intro.css' %}?v=10002">

<style>

/* =========================
   THEME VARIABLES
========================== */
body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#1a1a1a,#000000);
color:#ffffff;
transition:all 0.3s ease;
}

body.light-theme{
background:#f4f6f9;
color:#111;
}

/* =========================
   GRAPH CARD
========================== */
.graph-card{
max-width:950px;
margin:40px auto;
background:linear-gradient(135deg,#0f0f0f,#1b1b1b);
padding:35px 40px;
border-radius:16px;
box-shadow:0 0 25px rgba(255,0,0,0.35);
transition:all 0.3s ease;
}

body.light-theme .graph-card{
background:#ffffff;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.graph-title{
text-align:center;
font-size:30px;
font-weight:700;
margin-bottom:5px;
color:#ff4b4b;
}

body.light-theme .graph-title{
color:#c62828;
}

.graph-subtitle{
text-align:center;
font-size:18px;
margin-bottom:25px;
color:#ddd;
}

body.light-theme .graph-subtitle{
color:#555;
}

/* =========================
   KYMOGRAPH IMAGE
========================== */

.kymo-container{
text-align:center;
margin-top:20px;
}

.kymo-container img{
width:100%;
max-width:820px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.5);
}

.kymo-caption{
margin-top:12px;
font-weight:500;
color:#ffb3b3;
}

body.light-theme .kymo-caption{
color:#333;
}

/* =========================
   TOP RIGHT CONTROLS
========================== */

.theme-toggle{
position:absolute;
top:20px;
right:30px;
display:flex;
align-items:center;
gap:14px;
}

.toggle-switch{
position:relative;
width:52px;
height:26px;
}

.toggle-switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
inset:0;
background-color:#555;
border-radius:34px;
transition:0.4s;
}

.slider:before{
position:absolute;
content:"";
height:20px;
width:20px;
left:3px;
bottom:3px;
background-color:white;
border-radius:50%;
transition:0.4s;
}

input:checked + .slider{
background-color:#ff4b4b;
}

input:checked + .slider:before{
transform:translateX(26px);
}

.toggle-label{
font-size:14px;
color:#ccc;
}

body.light-theme .toggle-label{
color:#333;
}

/* FULLSCREEN BUTTON */

.fullscreen-btn{
padding:8px 14px;
border-radius:20px;
border:none;
cursor:pointer;
font-weight:600;
background:#ff2e2e;
color:#fff;
box-shadow:0 0 12px rgba(255,0,0,0.6);
transition:transform 0.25s,box-shadow 0.25s;
}

.fullscreen-btn:hover{
transform:scale(1.08);
box-shadow:0 0 18px rgba(255,0,0,0.9);
}

/* =========================
   NEXT BUTTON
========================== */

.next-btn{
display:flex;
justify-content:center;
margin-top:30px;
}

.next-btn button{
margin-top:25px;
padding:10px 28px;
font-size:15px;
font-weight:600;
border-radius:30px;
border:2px solid #ff2a2a;
background:transparent;
color:#ff2a2a;
cursor:pointer;
transition:all 0.35s ease;
letter-spacing:0.5px;
}

.next-btn button:hover{
background:linear-gradient(135deg,#ff2a2a,#8b0000);
color:#ffffff;
box-shadow:
0 0 8px rgba(255,42,42,0.7),
0 0 18px rgba(255,0,0,0.5);
transform:translateY(-2px) scale(1.03);
}

.next-btn button:active{
transform:scale(0.97);
}

</style>
</head>

<body>

<!-- 🌗 THEME + FULLSCREEN -->
<div class="theme-toggle">

<label class="toggle-switch">
<input type="checkbox" id="themeToggle">
<span class="slider"></span>
</label>

<span class="toggle-label">Light Mode</span>

<button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

</div>


<div class="graph-card">

<div class="graph-title">
Result (Kymograph Recording)
</div>

<div class="graph-subtitle">
Recording of responses of Acetylcholine (ACh), Adrenaline (Adr) and Barium chloride (BaCl₂)
</div>

<div class="kymo-container">

<img src="{% static 'experiments/spasmogens-spasmolytics-rabbit-jejunum/images/kymograph-recording.png' %}" 
alt="Kymograph Recording of Jejunum Contractions">

<div class="kymo-caption">
Typical kymograph tracing showing contractile responses of rabbit jejunum to spasmogens and spasmolytics.
</div>

</div>

<div class="next-btn">
<button onclick="location.href='/experiment/{{ experiment.slug }}/conclusion/'">
Next ▶
</button>
</div>

</div>


<script>

/* =========================
THEME TOGGLE
========================== */

const toggle=document.getElementById("themeToggle");

if(localStorage.getItem("uiTheme")==="light"){
document.body.classList.add("light-theme");
toggle.checked=true;
}

toggle.addEventListener("change",()=>{
document.body.classList.toggle("light-theme");

localStorage.setItem(
"uiTheme",
document.body.classList.contains("light-theme")?"light":"dark"
);
});


/* =========================
FULLSCREEN
========================== */

function toggleFullscreen(){

if(!document.fullscreenElement){
document.documentElement.requestFullscreen().catch(()=>{
alert("Fullscreen not supported");
});
}
else{
document.exitFullscreen();
}

}

</script>

</body>
</html>
