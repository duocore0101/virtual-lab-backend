{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Acute Eye Irritation Test – Aim</title>

  <!-- CSS (Reusing Rotarod CSS Structure) -->
  <link rel="stylesheet"
        href="{% static 'experiments/rotarod/css/intro.css' %}">

  <style>
    /* 🔝 TOP RIGHT ACTIONS */
    .top-actions {
      position: fixed;
      top: 20px;
      right: 25px;
      display: flex;
      gap: 12px;
      z-index: 9999;
    }

    .top-actions button {
      padding: 10px 18px;
      border-radius: 22px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: #ff2e2e;
      color: #fff;
      box-shadow: 0 0 14px rgba(255, 0, 0, 0.6);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .top-actions button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 22px rgba(255, 0, 0, 0.9);
    }
  </style>
</head>

<body>

<!-- 🔝 TOP RIGHT BUTTONS -->
<div class="top-actions">
  <button onclick="toggleTheme()">🌗 Theme</button>
  <button onclick="toggleFullscreen()">⛶ Full Screen</button>
</div>

<div class="page-container">

  <!-- =========================
       TITLE (AIM ONLY)
  ========================== -->
  <h1 class="title">Aim</h1>

  <!-- =========================
       AIM TEXT
  ========================== -->
  <div class="info-box">
    <p style="font-size:18px; text-align:center; font-weight:500;">
      To study and determine the acute eye irritation and/or corrosion potential
      of a given test substance in <strong>albino rabbits</strong>
      as per <strong>OECD Test Guideline 405</strong>.
    </p>
  </div>

  <!-- =========================
       NAVIGATION BUTTONS
  ========================== -->
  <div class="button-row" style="justify-content:center;">
    <button class="back-btn"
      onclick="location.href='/student/dashboard/'">
      ⬅ Back
    </button>

    <button class="exp-btn"
      onclick="location.href='/experiment/{{ experiment.slug }}/requirements/'">
      Next ▶
    </button>
  </div>

</div>

<!-- =========================
     🔧 SCRIPTS
========================== -->
<script>
function toggleTheme() {
  document.body.classList.toggle("light-mode");
}
</script>

<script>
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {
      alert("Fullscreen not supported");
    });
  } else {
    document.exitFullscreen();
  }
}
</script>

</body>
</html>
