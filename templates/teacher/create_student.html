{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Student | Teacher</title>

 
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="admin-header">
  <div class="logo-area">
    <img src="{% static 'images/gmars-logo.png' %}" class="logo">
    <span class="admin-badge">TEACHER</span>
  </div>

  <a href="/teacher/dashboard/" class="logout-btn">⬅ Back</a>
</header>

<!-- ================= FORM SECTION ================= -->
<section class="experiments-section">
  <h2>Create Student</h2>

  {% if error %}
    <p style="color:#ff4d4d; margin-bottom:15px;">
      {{ error }}
    </p>
  {% endif %}

  <!-- 🔐 IMPORTANT FIXES:
       1. method="POST"
       2. correct action URL
       3. csrf_token inside form
  -->
  <form method="POST" action="/teacher/create-student/">
    {% csrf_token %}

    <input
      type="text"
      name="name"
      placeholder="Student Full Name"
      required
    >

    <input
      type="email"
      name="email"
      placeholder="Student Email"
      required
    >

    <input
      type="password"
      name="password"
      placeholder="Password"
      required
    >

    <button type="submit" class="login-btn">
      ➕ Create Student
    </button>
  </form>
</section>

</body>
</html>
