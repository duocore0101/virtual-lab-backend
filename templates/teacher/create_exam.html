{% extends "teacher/base.html" %}
{% block title %}Create Exam{% endblock %}

{% block content %}

<div style="padding:30px; max-width:600px;">

    <h2>Create Exam</h2>

    <form method="POST">
        {% csrf_token %}

        <div style="margin-bottom:15px;">
            <label>Exam Title</label>
            <input type="text" name="title" class="form-control" required>
        </div>

        <div style="margin-bottom:15px;">
            <label>Select Examination</label>
            <select name="exam_type" class="form-control" required>
                <option value="">-- Select --</option>
                <option value="internal_1">Internal Examination Practical Sessional 1st</option>
                <option value="internal_2">Internal Examination Practical Sessional 2nd</option>
                <option value="external">External Examination Practical End Semester University Examination</option>
            </select>
        </div>

        <div style="margin-bottom:15px;">
            <label>Select Year</label>
            <select name="year" class="form-control" required>
                <option value="">-- Select --</option>
                <option value="dpharm_2">D. Pharm II Year</option>
                <option value="bpharm_4">B. Pharm II (Semester IV)</option>
                <option value="bpharm_56">B. Pharm III (Semester V, VI)</option>
                <option value="mpharm_12">M.Pharm I (Semester I, II)</option>
            </select>
        </div>

        <div style="margin-bottom:15px;">
            <label>Duration (Minutes)</label>
            <input type="number" name="duration" class="form-control" placeholder="120 for 2 hours" required>
        </div>

        <button type="submit" class="btn btn-success">
            Create Exam
        </button>

        <a href="/teacher/exams/" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
