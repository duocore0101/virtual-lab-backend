{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Student | G-MARS{% endblock %}</title>

  <link rel="stylesheet" href="{% static 'css/super_admin.css' %}">

  <style>

    /* ================= HEADER FIX ================= */

    .sa-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      height:100px;
      padding:0 25px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .logo img{
      height:85px;
      width:auto;
      transition:0.3s ease;
      object-fit:contain;
    }

    /* ================= BADGE ================= */

    .badge{
      background: var(--accent-red);
      color:#fff;
      font-size:12px;
      padding:5px 12px;
      border-radius:20px;
      font-weight:600;
      box-shadow:var(--shadow-red);
    }

    /* 🔥 Student Request Badge */

    .badge-count{
      background: var(--accent-red);
      color:#fff;
      font-size:11px;
      padding:3px 8px;
      border-radius:20px;
      margin-left:8px;
      box-shadow:var(--shadow-red);
    }

    /* ================= RESPONSIVE ================= */

    @media(max-width:900px){

      .sa-header{
        height:90px;
        padding:0 15px;
      }

      .logo img{
        height:80px;
      }

      .badge{
        font-size:10px;
        padding:4px 10px;
      }

    }

  </style>
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="sa-header">

  <div class="logo">
    <img src="{% static 'images/logo.png' %}" 
         class="logo" 
         alt="G-MARS">
    <span class="badge">Student Panel</span>
  </div>

  <div class="header-actions">

    <button class="icon-btn"
            title="Toggle Menu"
            onclick="toggleSidebar()">☰</button>

    <a href="{% url 'student-dashboard' %}"
       class="icon-btn"
       title="Dashboard">
       🏠
    </a>

    <button class="icon-btn"
            title="Toggle Theme"
            onclick="toggleTheme()">🌓</button>

    <a href="{% url 'logout' %}" 
       class="logout-btn">
       Logout
    </a>

  </div>

</header>

<!-- ================= MAIN LAYOUT ================= -->
<div class="sa-layout">

  <!-- ================= SIDEBAR ================= -->
  <aside class="sa-sidebar">
    <nav>

      <a href="{% url 'student-dashboard' %}"
         class="{% if '/student/dashboard/' in request.path %}active{% endif %}">
        🏠 <span>Dashboard</span>
      </a>

      <a href="{% url 'student-dashboard' %}"
         class="{% if '/experiment/' in request.path %}active{% endif %}">
        🧪 <span>My Practicals</span>
      </a>

      <a href="{% url 'student-exams' %}"
         class="{% if '/student/exams/' in request.path %}active{% endif %}">
        📝 <span>My Exams</span>
      </a>

      <a href="{% url 'student-dashboard' %}"
         class="{% if '/attempt' in request.path %}active{% endif %}">
        📊 <span>My Attempts</span>
      </a>

      <a href="#"
         class="{% if '/student/settings/' in request.path %}active{% endif %}">
        ⚙ <span>Settings</span>
      </a>

    </nav>
  </aside>

  <!-- ================= PAGE CONTENT ================= -->
  <main class="sa-content">
    {% block content %}{% endblock %}
  </main>

</div>

<!-- ================= FOOTER ================= -->
<footer class="sa-footer">
  <p>© 2026 G-MARS Pharma Solutions | Student Portal</p>
</footer>

<script src="{% static 'js/theme-toggle.js' %}"></script>
<script src="{% static 'js/sidebar-toggle.js' %}"></script>

</body>
</html>
