{% extends "superadmin/base.html" %}
{% block title %}Create Admin | Super Admin{% endblock %}

{% block content %}

<style>
/* ===============================
   SUPER ADMIN CREATE FORM
=============================== */
.form-wrapper {
  max-width: 480px;
  margin: 60px auto;
  background: #0b0b0b;
  padding: 40px;
  border-radius: 16px;
  box-shadow:
    0 0 40px rgba(229,9,20,0.35),
    inset 0 0 0 rgba(255,255,255,0.05);
  animation: fadeUp 0.7s ease;
}

.form-wrapper h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #fff;
}

.form-wrapper input {
  width: 100%;
  padding: 14px;
  margin-bottom: 18px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: #fff;
  font-size: 14px;
  outline: none;
  box-shadow: inset 0 0 0 1px #222;
  transition: 0.3s;
}

.form-wrapper input:focus {
  box-shadow:
    inset 0 0 0 1px #e50914,
    0 0 10px rgba(229,9,20,0.6);
}

.submit-btn {
  width: 100%;
  padding: 14px;
  border-radius: 30px;
  border: none;
  font-weight: 700;
  font-size: 15px;
  background: linear-gradient(135deg, #e50914, #ff3b3b);
  color: white;
  cursor: pointer;
  transition: 0.35s;
  box-shadow: 0 0 25px rgba(229,9,20,0.6);
}

.submit-btn:hover {
  transform: translateY(-3px);
  box-shadow:
    0 0 40px rgba(255,80,80,0.9),
    0 0 80px rgba(255,80,80,0.4);
}

.error {
  color: #ff4d4d;
  text-align: center;
  margin-bottom: 15px;
  font-size: 14px;
}

.back-link {
  display: block;
  text-align: center;
  margin-top: 18px;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 14px;
}

.back-link:hover {
  color: var(--accent-red);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>

<div class="form-wrapper">

  <h2>Create College Admin</h2>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <input
      type="text"
      name="name"
      placeholder="Admin Full Name"
      required
    >

    <input
      type="email"
      name="email"
      placeholder="Admin Email"
      required
    >

    <input
      type="text"
      name="college_name"
      placeholder="College Name"
      required
    >

    <input
      type="text"
      name="college_code"
      placeholder="College Code (Unique)"
      required
    >

    <input
      type="password"
      name="password"
      placeholder="Password"
      required
    >

    <button type="submit" class="submit-btn">
      ➕ Create Admin
    </button>
  </form>

  <a href="/superadmin/dashboard/" class="back-link">
    ← Back to Dashboard
  </a>

</div>

{% endblock %}
