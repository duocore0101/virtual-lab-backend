{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Create Teacher</title>
  <link rel="stylesheet" href="{% static 'css/teacher.css' %}?v=9999">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="admin-header">
  <div class="logo-area">
    <img src="{% static 'images/gmars-logo.png' %}" class="logo">
    <span class="admin-badge">ADMIN</span>
  </div>
  <a href="/admin/dashboard/" class="logout-btn">⬅ Back</a>
</header>

<!-- ================= CREATE TEACHER FORM ================= -->
<section class="experiments-section">
  <h2>Create Teacher Account</h2>

  {% if error %}
    <p style="color:red;">{{ error }}</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <!-- Teacher Basic Details -->
    <input type="text" name="name" placeholder="Teacher Name" required>
    <input type="email" name="email" placeholder="Teacher Email" required>
    <input type="password" name="password" placeholder="Password" required>

    <!-- Assign Practicals -->
    <h3 style="margin-top:20px;">Assign Practicals</h3>

    <div style="margin-bottom:15px;">
      {% for exp in experiments %}
        <label style="display:block; margin-bottom:6px;">
          <input type="checkbox" name="experiments" value="{{ exp.id }}">
          {{ exp.name }}
        </label>
      {% empty %}
        <p>No experiments available to assign.</p>
      {% endfor %}
    </div>

    <button type="submit" class="login-btn">Create Teacher</button>
  </form>
</section>

</body>
</html>
